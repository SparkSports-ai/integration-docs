services:
  - type: web
    name: integration-docs
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
      # Cloudflare Access origin protection (see ACCESS.md).
      # Leave unset to disable enforcement; set both to lock the origin to Access.
      - key: CF_ACCESS_TEAM_DOMAIN
        sync: false
      - key: CF_ACCESS_AUD
        sync: false
